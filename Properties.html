<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Properties - CRM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #5D9CEC;
            min-height: 100vh;
            color: #FFFFFF;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        input[type="text"] {
            padding: 10px 15px;
            border: 1px solid #3a5268;
            border-radius: 6px;
            background: #1a2535;
            color: #FFFFFF;
            font-size: 14px;
            width: 250px;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #F39C12;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #F39C12;
            color: white;
            border-radius: 24px;
        }

        .btn-primary:hover {
            background: #d4890e;
        }

        .btn-secondary {
            background: #3a5268;
            color: #ABB2B9;
            border-radius: 24px;
        }

        .btn-secondary:hover {
            background: #4a6278;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #ABB2B9;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #3a5268;
            border-top: 3px solid #F39C12;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .table-wrapper {
            background: #2D3E50;
            border: none;
            border-radius: 16px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        thead {
            background: #1a2535;
            border-bottom: 2px solid #3a5268;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #ABB2B9;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 12px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #3a5268;
            color: #FFFFFF;
        }

        tbody tr:hover {
            background: #3a4f63;
        }

        .property-name {
            font-weight: 600;
            color: #fff;
        }

        .property-id {
            color: #F39C12;
            font-weight: 600;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-contacted {
            background: rgba(52, 168, 83, 0.2);
            color: #34A853;
        }

        .badge-ia-sent {
            background: rgba(251, 188, 4, 0.2);
            color: #FBBC04;
        }

        .badge-ia-signed {
            background: rgba(100, 200, 255, 0.2);
            color: #64c8ff;
        }

        .badge-installed {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        .badge-high-priority {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .badge-medium-priority {
            background: rgba(251, 188, 4, 0.2);
            color: #FBBC04;
        }

        .badge-low-priority {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #ABB2B9;
        }

        .empty-state p {
            margin-bottom: 20px;
            font-size: 16px;
        }

        .status-info {
            margin-top: 20px;
            padding: 15px;
            background: rgba(243, 156, 18, 0.1);
            border: 1px solid #F39C12;
            border-radius: 6px;
            color: #ABB2B9;
            font-size: 13px;
        }

        .count {
            color: #ABB2B9;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👥 All Properties</h1>
            <div class="controls">
                <input
                    type="text"
                    id="searchInput"
                    placeholder="Search properties..."
                    onkeyup="filterProperties()"
                >
                <select id="statusFilter" onchange="filterProperties()" style="padding: 10px 15px; border: 1px solid #3a5268; border-radius: 6px; background: #1a2535; color: #FFFFFF; font-size: 14px;">
                    <option value="">Active Properties</option>
                    <option value="Contacted">Contacted</option>
                    <option value="IA Sent">IA Sent</option>
                    <option value="IA Signed">IA Signed</option>
                    <option value="TPV Sent">TPV Sent</option>
                    <option value="TPV Signed">TPV Signed</option>
                    <option value="Installed">Installed</option>
                    <option value="Voicemail Left">Voicemail Left</option>
                    <option value="No Answer">No Answer</option>
                    <option value="No Access">No Access</option>
                </select>
                <select id="agentFilter" onchange="filterProperties()" style="padding: 10px 15px; border: 1px solid #3a5268; border-radius: 6px; background: #1a2535; color: #FFFFFF; font-size: 14px;">
                    <option value="">All Agents</option>
                </select>
                <select id="priorityFilter" onchange="filterProperties()" style="padding: 10px 15px; border: 1px solid #3a5268; border-radius: 6px; background: #1a2535; color: #FFFFFF; font-size: 14px;">
                    <option value="">All Priorities</option>
                    <option value="High">High</option>
                    <option value="Medium">Medium</option>
                    <option value="Low">Low</option>
                </select>
                <button class="btn-primary" onclick="goToDashboard()">← Back to Dashboard</button>
            </div>
        </div>

        <div id="loading" class="loading">
            <span class="spinner"></span>Loading properties...
        </div>

        <div id="tableContainer" style="display: none;">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Latest Activity</th>
                            <th>Property Name</th>
                            <th>Address</th>
                            <th>Phone</th>
                            <th>Units</th>
                            <th>Agent</th>
                            <th>Priority</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="propertiesTable">
                    </tbody>
                </table>
            </div>
            <div class="count" id="propertyCount"></div>
        </div>

        <div id="emptyState" style="display: none;">
            <div class="empty-state">
                <p>No properties found</p>
            </div>
        </div>
    </div>

    <script>
        // Supabase Configuration
        const SUPABASE_URL = "https://blhxgcncijmxxhleqmri.supabase.co";
        const SUPABASE_API_KEY = "sb_publishable_T9uXncJJ9m-4fV7xDLzWPA_enkmnDHi";

        let allProperties = [];
        let allCalls = [];
        let allEmails = [];

        // Fetch properties from Supabase
        async function loadProperties() {
            try {
                console.log('Fetching from:', `${SUPABASE_URL}/rest/v1/properties`);

                const propsResponse = await fetch(`${SUPABASE_URL}/rest/v1/properties?order=property_id`, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_API_KEY,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=representation',
                        'Cache-Control': 'no-cache',
                        'Pragma': 'no-cache'
                    }
                });

                const callsResponse = await fetch(`${SUPABASE_URL}/rest/v1/calls`, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_API_KEY,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=representation'
                    }
                });

                const emailsResponse = await fetch(`${SUPABASE_URL}/rest/v1/emails`, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_API_KEY,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=representation'
                    }
                });

                console.log('Response status:', propsResponse.status);
                const propsText = await propsResponse.text();
                const callsText = await callsResponse.text();
                const emailsText = await emailsResponse.text();

                if (!propsResponse.ok) {
                    throw new Error(`HTTP ${propsResponse.status}: ${propsText}`);
                }

                allProperties = JSON.parse(propsText);
                allCalls = callsResponse.ok ? JSON.parse(callsText) : [];
                allEmails = emailsResponse.ok ? JSON.parse(emailsText) : [];
                console.log('Loaded properties:', allProperties);
                console.log('Loaded calls:', allCalls);
                console.log('Loaded emails:', allEmails);

                document.getElementById('loading').style.display = 'none';
                populateAgentFilter();
                filterProperties();

            } catch (error) {
                console.error('Error loading properties:', error);
                document.getElementById('loading').style.display = 'none';

                // Show error message
                const emptyState = document.getElementById('emptyState');
                emptyState.innerHTML = `
                    <div class="empty-state">
                        <p>⚠️ Error loading properties</p>
                        <p style="font-size: 12px; color: #666;">${error.message}</p>
                        <p style="font-size: 12px; margin-top: 20px;">Check browser console (F12) for details</p>
                    </div>
                `;
                emptyState.style.display = 'block';
            }
        }

        function parseDate(dateStr) {
            // Parse date string without timezone conversion
            if (!dateStr) return null;
            const parts = dateStr.split('T')[0].split('-');
            if (parts.length === 3) {
                return new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
            }
            return new Date(dateStr);
        }

        function getLatestActivity(propertyId) {
            // Get all calls and emails for this property, sorted by date
            const propertyCalls = allCalls.filter(c => c.property_id === propertyId) || [];
            const propertyEmails = allEmails.filter(e => e.property_id === propertyId) || [];

            // Get the latest date from either calls or emails
            let latestDate = null;
            let latestDateStr = '';
            let activities = [];

            // Process calls
            propertyCalls.forEach(call => {
                const callDate = parseDate(call.date_called);
                const dateStr = call.date_called ? call.date_called.split('T')[0] : '';

                if (!latestDate || callDate > latestDate) {
                    latestDate = callDate;
                    latestDateStr = dateStr;
                    activities = [];
                } else if (dateStr === latestDateStr) {
                    // Same day, add activity
                } else {
                    return;
                }

                // Convert interaction type to abbreviation
                const type = call.interaction_type || '';
                let abbr = '';
                if (type.toLowerCase() === 'spoke with') abbr = 'SPK';
                else if (type.toLowerCase() === 'voicemail') abbr = 'LVM';
                else if (type.toLowerCase() === 'no answer') abbr = 'NA';
                else if (type.toLowerCase() === 'wrong number') abbr = 'WN';

                if (abbr && !activities.includes(abbr)) activities.push(abbr);
            });

            // Process emails
            propertyEmails.forEach(email => {
                const emailDate = parseDate(email.date_sent);
                const dateStr = email.date_sent ? email.date_sent.split('T')[0] : '';

                if (!latestDate || emailDate > latestDate) {
                    latestDate = emailDate;
                    latestDateStr = dateStr;
                    activities = ['EM'];
                } else if (dateStr === latestDateStr) {
                    if (!activities.includes('EM')) activities.push('EM');
                }
            });

            if (!latestDate) return '';

            // Format: M/D abbr1, abbr2, abbr3
            const month = latestDate.getMonth() + 1;
            const day = latestDate.getDate();
            return `${month}/${day} ${activities.join(', ')}`;
        }

        function toggleActivityDetails(propertyId) {
            const detailsRow = document.getElementById(`details-${propertyId}`);
            const arrow = document.getElementById(`arrow-${propertyId}`);

            if (detailsRow.style.display === 'none' || !detailsRow.style.display) {
                detailsRow.style.display = 'table-row';
                arrow.style.transform = 'rotate(180deg)';
            } else {
                detailsRow.style.display = 'none';
                arrow.style.transform = 'rotate(0deg)';
            }
        }

        function getActivityDetails(propertyId) {
            const propertyCalls = allCalls.filter(c => c.property_id === propertyId) || [];
            const propertyEmails = allEmails.filter(e => e.property_id === propertyId) || [];

            // Combine and sort by date descending
            const activities = [];
            propertyCalls.forEach(call => {
                activities.push({
                    date: call.date_called,
                    type: 'call',
                    interaction: call.interaction_type,
                    notes: call.notes || ''
                });
            });
            propertyEmails.forEach(email => {
                activities.push({
                    date: email.date_sent,
                    type: 'email',
                    status: email.status,
                    notes: email.notes || ''
                });
            });

            activities.sort((a, b) => new Date(b.date) - new Date(a.date));

            if (activities.length === 0) {
                return '<div style="color: #ABB2B9; font-size: 12px;">No activity recorded</div>';
            }

            let html = '';
            activities.forEach(activity => {
                const date = new Date(activity.date);
                const dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                const activityType = activity.type === 'call' ? activity.interaction : `Emailed (${activity.status})`;
                const notes = activity.notes ? `<br><span style="color: #ABB2B9; font-size: 11px; margin-left: 20px;">Notes: ${activity.notes}</span>` : '';

                html += `<div style="padding: 8px 0; border-bottom: 1px solid #3a5268;">
                    <div style="color: #F39C12; font-size: 12px; font-weight: 600;">${dateStr} - ${activityType}</div>
                    ${notes}
                </div>`;
            });

            return html;
        }

        function displayProperties(properties) {
            const tableBody = document.getElementById('propertiesTable');
            const tableContainer = document.getElementById('tableContainer');
            const emptyState = document.getElementById('emptyState');

            if (!properties || properties.length === 0) {
                tableContainer.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            tableContainer.style.display = 'block';
            emptyState.style.display = 'none';

            tableBody.innerHTML = '';

            properties.forEach(prop => {
                // Main row
                const row = document.createElement('tr');
                const statusBadge = getStatusBadge(prop.status);
                const priorityBadge = getPriorityBadge(prop.priority);
                const activity = getLatestActivity(prop.property_id);

                row.innerHTML = `
                    <td style="color: #ABB2B9; font-size: 12px; cursor: pointer;" onclick="toggleActivityDetails('${prop.property_id}')">
                        ${activity} <span id="arrow-${prop.property_id}" style="display: inline-block; transition: transform 0.2s;">▼</span>
                    </td>
                    <td><a href="PropertyDetail.html?id=${prop.property_id}" style="color: #5D9CEC; font-weight: 600; text-decoration: none; cursor: pointer;">${prop.property_name || 'N/A'}</a></td>
                    <td>${prop.address || 'N/A'}</td>
                    <td>${prop.phone_number || 'N/A'}</td>
                    <td>${prop.units || 'N/A'}</td>
                    <td>${prop.agent || 'N/A'}</td>
                    <td>${priorityBadge}</td>
                    <td>${statusBadge}</td>
                `;
                tableBody.appendChild(row);

                // Expanded details row
                const detailsRow = document.createElement('tr');
                detailsRow.id = `details-${prop.property_id}`;
                detailsRow.style.display = 'none';
                detailsRow.style.background = '#1a2535';
                detailsRow.innerHTML = `
                    <td colspan="8" style="padding: 15px; border-top: 1px solid #3a5268;">
                        <div style="color: #ABB2B9; font-size: 13px; font-weight: 600; margin-bottom: 10px;">Activity History:</div>
                        <div style="padding: 10px; background: #263549; border-radius: 6px; font-size: 12px;">
                            ${getActivityDetails(prop.property_id)}
                        </div>
                    </td>
                `;
                tableBody.appendChild(detailsRow);
            });

            document.getElementById('propertyCount').textContent = `Showing ${properties.length} properties`;
        }

        function populateAgentFilter() {
            const agentSelect = document.getElementById('agentFilter');

            // Add hardcoded agents
            const agents = ['Tom', 'Deneane'];

            agents.forEach(agent => {
                const option = document.createElement('option');
                option.value = agent;
                option.textContent = agent;
                agentSelect.appendChild(option);
            });
        }

        function getStatusBadge(status) {
            const badgeMap = {
                'Contacted': 'badge-contacted',
                'IA Sent': 'badge-ia-sent',
                'IA Signed': 'badge-ia-signed',
                'TPV Sent': 'badge-ia-sent',
                'TPV Signed': 'badge-ia-signed',
                'Installed': 'badge-installed',
                'Paid': 'badge-installed'
            };

            const badgeClass = badgeMap[status] || 'badge-contacted';
            return `<span class="badge ${badgeClass}">${status || 'New'}</span>`;
        }

        function getPriorityBadge(priority) {
            const priorityMap = {
                'High': 'badge-high-priority',
                'Medium': 'badge-medium-priority',
                'Low': 'badge-low-priority'
            };

            const badgeClass = priorityMap[priority] || 'badge-medium-priority';
            return `<span class="badge ${badgeClass}">${priority || 'Medium'}</span>`;
        }

        function filterProperties() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const statusFilter = document.getElementById('statusFilter').value;
            const agentFilter = document.getElementById('agentFilter').value;
            const priorityFilter = document.getElementById('priorityFilter').value;

            const filtered = allProperties.filter(prop => {
                // Text search filter
                const searchFields = [
                    prop.property_id,
                    prop.property_name,
                    prop.address,
                    prop.agent,
                    prop.phone_number
                ].map(field => (field || '').toString().toLowerCase());

                const matchesSearch = searchFields.some(field => field.includes(searchTerm));

                // Status filter - exclude "No Access" by default unless specifically selected
                const matchesStatus = (!statusFilter && prop.status !== 'No Access') || prop.status === statusFilter;

                // Agent filter
                const matchesAgent = !agentFilter || prop.agent === agentFilter;

                // Priority filter
                const matchesPriority = !priorityFilter || prop.priority === priorityFilter;

                return matchesSearch && matchesStatus && matchesAgent && matchesPriority;
            }).sort((a, b) => {
                // Sort by property_id
                return a.property_id.localeCompare(b.property_id);
            });

            displayProperties(filtered);
        }

        function goToDashboard() {
            window.location.href = 'Index.html';
        }

        // Load properties on page load
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadProperties);
        } else {
            loadProperties();
        }
    </script>
</body>
</html>
